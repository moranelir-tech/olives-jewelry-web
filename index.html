<!doctype html>
<html lang="he">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Olives Jewelry</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="/">Olives Jewelry</a>
      <button class="nav-toggle" aria-expanded="false" aria-controls="main-nav" aria-label="פתח תפריט">
        <span class="hamburger" aria-hidden="true"></span>
      </button>
      <nav id="main-nav" class="main-nav" hidden>
        <ul>
          <li><a href="/">בית</a></li>
          <li><a href="/shop">חנות</a></li>
          <li><a href="/about">אודות</a></li>
          <li><a href="/contact">צור קשר</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <picture>
        <source srcset="images/hero-1200.jpg 1200w, images/hero-800.jpg 800w, images/hero-480.jpg 480w" sizes="(min-width:1024px) 1200px, (min-width:768px) 800px, 100vw">
        <img src="images/hero-800.jpg" alt="תכשיטים" class="responsive-img" />
      </picture>
      <h1>כותרת ראשית</h1>
      <p>תיאור קצר של החנות והתכשיטים.</p>
    </section>

    <section class="products">
      <h2>מוצרים נבחרים</h2>
      <div class="grid">
        <article class="product-card">
          <a href="/product/1">
            <img src="images/product-1-800.jpg" alt="שרשרת זהב" class="responsive-img">
            <h3>שרשרת זהב</h3>
            <p class="price">₪199</p>
          </a>
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer container">
    <p>© Olives Jewelry</p>
  </footer>

  <script src="js/mobile-nav.js"></script>
</body>
</html>
